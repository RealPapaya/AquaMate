<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="dropMain" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#00e5f0"/>
      <stop offset="60%" stop-color="#00c4d8"/>
      <stop offset="100%" stop-color="#0099b8"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#020d1a" opacity="0.95"/>
  
  <!-- Main water drop -->
  <path 
    d="M256 80C256 80 160 240 160 320C160 400 200 460 256 460C312 460 352 400 352 320C352 240 256 80 256 80Z" 
    fill="url(#dropMain)" 
    opacity="0.95"
    filter="url(#glow)"
  />
  
  <!-- Highlight -->
  <ellipse 
    cx="220" 
    cy="260" 
    rx="30" 
    ry="50" 
    fill="white" 
    opacity="0.35" 
    transform="rotate(-20 220 260)"
  />
  
  <!-- Small droplets -->
  <circle cx="180" cy="200" r="12" fill="#00e5f0" opacity="0.6"/>
  <circle cx="320" cy="220" r="10" fill="#00e5f0" opacity="0.5"/>
  <circle cx="280" cy="180" r="8" fill="#00e5f0" opacity="0.4"/>
</svg>
